<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Función Coseno</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e2f; text-align: center; padding: 20px; color: white;}
        .btn-volver { display: inline-block; padding: 10px 20px; background-color: #00ffcc; color: #1e1e2f; text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .btn-volver:hover { background-color: #00cca3; }
        canvas { background-color: #2a2a40; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid #00ffcc; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    
    <h2>Ejercicio 3: Curva Dinámica de Coseno</h2>
    <canvas id="canvasCoseno" width="700" height="300"></canvas>

    <script>
        const canvas = document.getElementById("canvasCoseno");
        const ctx = canvas.getContext("2d");
        let desplazamiento = 0;

        function dibujarCoseno() {
            // Limpiar lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Línea central (Eje X)
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "#555"; 
            ctx.lineWidth = 1;
            ctx.stroke();

            // Dibujar la curva Coseno
            ctx.beginPath();
            ctx.strokeStyle = "#00ffcc"; 
            ctx.lineWidth = 3;

            for (let x = 0; x < canvas.width; x++) {
                // Función matemática y = cos(x)
                let y = 150 + Math.cos((x * 0.05) + desplazamiento) * 80;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.stroke();
            desplazamiento += 1; // La variable avanza
        }

        // Actualizar cada segundo (1000 milisegundos)
        setInterval(dibujarCoseno, 1000);
        dibujarCoseno();
    </script>
</body>
</html>
