<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <h1>computación grafica</h1>
  <h1>Eliseo Pancorbo Diaz</h1>
    <title>Plano Cartesiano Interactivo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 20px;
        }
        canvas {
            background-color: white;
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .controls {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            display: flex;
            gap: 10px;
        }
        input {
            padding: 8px;
            width: 60px;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h2>Gráfica en el Plano Cartesiano</h2>
    
    <canvas id="plano" width="500" height="500"></canvas>

    <div class="controls">
        <label>X: <input type="number" id="posX" value="0"></label>
        <label>Y: <input type="number" id="posY" value="0"></label>
        <button onclick="graficarPunto()">Graficar Punto</button>
        <button onclick="limpiarPlano()" style="background-color: #dc3545;">Limpiar</button>
    </div>

    <script>
        const canvas = document.getElementById('plano');
        const ctx = canvas.getContext('2d');
        const ancho = canvas.width;
        const alto = canvas.height;
        const escala = 25; // Píxeles por unidad

        function dibujarPlano() {
            ctx.clearRect(0, 0, ancho, alto);
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 1;

            // Dibujar cuadrícula
            for (let x = 0; x <= ancho; x += escala) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, alto);
                ctx.stroke();
            }
            for (let y = 0; y <= alto; y += escala) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(ancho, y);
                ctx.stroke();
            }

            // Dibujar ejes principales
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;

            // Eje X
            ctx.beginPath();
            ctx.moveTo(0, alto / 2);
            ctx.lineTo(ancho, alto / 2);
            ctx.stroke();

            // Eje Y
            ctx.beginPath();
            ctx.moveTo(ancho / 2, 0);
            ctx.lineTo(ancho / 2, alto);
            ctx.stroke();
            
            // Etiquetas de origen
            ctx.font = "12px Arial";
            ctx.fillText("0", ancho/2 + 5, alto/2 + 15);
        }

        function graficarPunto() {
            const xVal = parseFloat(document.getElementById('posX').value);
            const yVal = parseFloat(document.getElementById('posY').value);

            // Conversión de coordenadas matemáticas a coordenadas de Canvas
            // El centro del canvas (250, 250) es nuestro (0,0)
            const canvasX = (ancho / 2) + (xVal * escala);
            const canvasY = (alto / 2) - (yVal * escala);

            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(canvasX, canvasY, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "black";
            ctx.fillText(`(${xVal}, ${yVal})`, canvasX + 8, canvasY - 8);
        }

        function limpiarPlano() {
            dibujarPlano();
        }

        // Inicializar el plano al cargar
        dibujarPlano();
    </script>
</body>
</html>
