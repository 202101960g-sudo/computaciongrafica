<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfico de Barras Predefinido</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-volver { display: inline-block; padding: 8px 16px; border: 1px solid #30363d; color: #58a6ff; text-decoration: none; border-radius: 6px; margin-bottom: 20px; transition: 0.2s; }
        .btn-volver:hover { background-color: #30363d; }
        canvas { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    <h2>Ejercicio 3: Gráfico de Barras con Datos Predefinidos</h2>
    <canvas id="canvasBarrasEstaticas" width="500" height="300"></canvas>

    <script>
        const canvas = document.getElementById("canvasBarrasEstaticas");
        const ctx = canvas.getContext("2d");

        // Datos predefinidos
        const datos = [120, 200, 80, 150, 250];
        const anchoBarra = 50;
        const espacio = 30;

        ctx.fillStyle = "#58a6ff";

        for (let i = 0; i < datos.length; i++) {
            let x = 50 + (i * (anchoBarra + espacio));
            let y = canvas.height - datos[i] - 20; // 20px de margen inferior
            let alto = datos[i];
            
            ctx.fillRect(x, y, anchoBarra, alto);
        }

        // Línea base
        ctx.beginPath();
        ctx.moveTo(20, canvas.height - 20);
        ctx.lineTo(480, canvas.height - 20);
        ctx.strokeStyle = "white";
        ctx.stroke();
    </script>
</body>
</html>
