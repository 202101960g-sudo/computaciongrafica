<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4 - Velocidades Extremas</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-volver { display: inline-block; padding: 8px 16px; border: 1px solid #30363d; color: #ff7b72; text-decoration: none; border-radius: 6px; margin-bottom: 20px; transition: 0.2s; }
        .btn-volver:hover { background-color: #30363d; }
        canvas { background-color: #0d1117; border: 2px solid #30363d; border-radius: 8px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); }
        .legend { display: flex; justify-content: center; gap: 30px; margin-top: 15px; font-weight: bold; }
        .red { color: #ff3333; }
        .cyan { color: #00f2ff; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    <h2>Comparación de Frecuencia y Velocidad</h2>
    
    <canvas id="canvasPro" width="800" height="450"></canvas>
    
    <div class="legend">
        <span class="red">● ONDA LENTA (Gran Tamaño)</span>
        <span class="cyan">● ONDA RÁPIDA (Pequeña / Alta Velocidad)</span>
    </div>

    <script>
        const canvas = document.getElementById("canvasPro");
        const ctx = canvas.getContext("2d");
        
        let t = 0; // Variable de tiempo

        function dibujarPlano() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Cuadrícula sutil
            ctx.strokeStyle = "#161b22";
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Ejes X e Y
            ctx.strokeStyle = "#444d56";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height);
            ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dibujarPlano();

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // --- ONDA 1: ROJA (GIGANTE Y LENTA) ---
            ctx.beginPath();
            ctx.strokeStyle = "#ff3333";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff3333";
            
            for (let x = -cx; x < cx; x++) {
                // Amplitud 140 (Grande), Velocidad 0.5 (Lenta)
                let y = 140 * Math.sin(x * 0.01 + t * 0.5); 
                if (x === -cx) ctx.moveTo(cx + x, cy - y);
                else ctx.lineTo(cx + x, cy - y);
            }
            ctx.stroke();

            // --- ONDA 2: CYAN (PEQUEÑA Y MUY RÁPIDA) ---
            ctx.beginPath();
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00f2ff";
            
            for (let x = -cx; x < cx; x++) {
                // Amplitud 30 (Pequeña), Frecuencia 0.1 (Muchas curvas), Velocidad 8 (Ultra Rápida)
                let y = 30 * Math.sin(x * 0.1 + t * 8); 
                if (x === -cx) ctx.moveTo(cx + x, cy - y);
                else ctx.lineTo(cx + x, cy - y);
            }
            ctx.stroke();

            // Limpiar sombra para que no afecte a otros elementos
            ctx.shadowBlur = 0;

            t += 0.05; // Incremento de tiempo constante
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
