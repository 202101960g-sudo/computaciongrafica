<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4 - Ondas Separadas</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-volver { display: inline-block; padding: 8px 16px; border: 1px solid #30363d; color: #ff7b72; text-decoration: none; border-radius: 6px; margin-bottom: 20px; transition: 0.2s; }
        .btn-volver:hover { background-color: #30363d; }
        canvas { background-color: #0d1117; border: 2px solid #30363d; border-radius: 8px; box-shadow: 0 0 20px rgba(88, 166, 255, 0.1); }
        .legend { display: flex; justify-content: center; gap: 30px; margin-top: 15px; font-size: 0.9rem; }
        .green { color: #3fb950; }
        .red { color: #ff7b72; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    <h2>Ondas: Positiva vs Negativa (Movimiento a la Derecha)</h2>
    
    <canvas id="canvasPro" width="800" height="450"></canvas>
    
    <div class="legend">
        <span class="green">🟢 Arriba (Positiva): Larga, rápida y estirada.</span>
        <span class="red">🔴 Abajo (Negativa): Corta, lenta y con más "puntadas".</span>
    </div>

    <script>
        const canvas = document.getElementById("canvasPro");
        const ctx = canvas.getContext("2d");
        
        let t = 0; // Variable de tiempo

        function dibujarPlano() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Cuadrícula sutil
            ctx.strokeStyle = "#161b22";
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Ejes X e Y principales (Eje 0)
            ctx.strokeStyle = "#444d56";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); // Eje X (Punto 0 de altura)
            ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); // Eje Y (Centro)
            ctx.stroke();

            // Etiquetas del eje Y
            ctx.fillStyle = "#8b949e";
            ctx.font = "12px sans-serif";
            ctx.fillText("+Y (Positivo)", cx + 10, 20);
            ctx.fillText("-Y (Negativo)", cx + 10, canvas.height - 10);
            ctx.fillText("0", cx + 5, cy - 5);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dibujarPlano();

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // --- ONDA 1: ARRIBA (POSITIVA) | LARGA Y RÁPIDA ---
            ctx.beginPath();
            ctx.strokeStyle = "#3fb950"; // Verde
            ctx.lineWidth = 3;
            
            for (let x = -cx; x < cx; x++) {
                // Eje base en +120 (Arriba del 0)
                // x * 0.02 = Ondas largas
                // - t * 6 = Movimiento rápido a la DERECHA
                let yMath = 120 + 40 * Math.sin(x * 0.02 - t * 6); 
                
                // Convertimos coordenada matemática a coordenada de Canvas
                if (x === -cx) ctx.moveTo(cx + x, cy - yMath);
                else ctx.lineTo(cx + x, cy - yMath);
            }
            ctx.stroke();

            // --- ONDA 2: ABAJO (NEGATIVA) | CORTA Y LENTA ---
            ctx.beginPath();
            ctx.strokeStyle = "#ff7b72"; // Rojo
            ctx.lineWidth = 3;
            
            for (let x = -cx; x < cx; x++) {
                // Eje base en -120 (Abajo del 0)
                // x * 0.1 = Ondas cortas (más puntadas)
                // - t * 1.5 = Movimiento lento a la DERECHA
                let yMath = -120 + 20 * Math.sin(x * 0.1 - t * 1.5); 
                
                if (x === -cx) ctx.moveTo(cx + x, cy - yMath);
                else ctx.lineTo(cx + x, cy - yMath);
            }
            ctx.stroke();

            t += 0.02; // Aumentamos el tiempo
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
