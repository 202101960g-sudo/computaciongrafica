<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - Función Coseno</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-volver { display: inline-block; padding: 8px 16px; border: 1px solid #30363d; color: #58a6ff; text-decoration: none; border-radius: 6px; margin-bottom: 20px; transition: 0.2s; }
        .btn-volver:hover { background-color: #30363d; }
        canvas { background-color: #0d1117; border: 2px solid #30363d; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    <h2>Curva Dinámica: y = cos(x)</h2>
    <canvas id="canvasCoseno" width="700" height="400"></canvas>

    <script>
        const canvas = document.getElementById("canvasCoseno");
        const ctx = canvas.getContext("2d");
        
        let avanceTiempo = 0; // El valor de 'x' que irá avanzando progresivamente

        // Función para dibujar el fondo cuadriculado y los ejes
        function dibujarPlanoCartesiano() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.strokeStyle = "#161b22"; 
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i = 0; i < canvas.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            ctx.strokeStyle = "#8b949e";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); // Eje X
            ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); // Eje Y
            ctx.stroke();
        }

        function actualizarCoseno() {
            // 4. Limpiar lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar plano cartesiano
            dibujarPlanoCartesiano();

            const cy = canvas.height / 2;

            // Dibujar la curva de Coseno
            ctx.beginPath();
            ctx.strokeStyle = "#3fb950"; // Verde brillante
            ctx.lineWidth = 3;

            // Recorrer el ancho del canvas para calcular los puntos
            for (let x = 0; x < canvas.width; x++) {
                
                // Matemática real: y = cos(x)
                // Se escala x por 0.05 para que la onda se vea bien en pantalla
                // Se suma avanceTiempo para simular el avance progresivo
                let yMatematico = Math.cos((x * 0.05) + avanceTiempo);
                
                // Se multiplica por 80 (amplitud) y se ajusta al centro Y del canvas
                let yCanvas = cy - (yMatematico * 80); 
                
                if (x === 0) {
                    ctx.moveTo(x, yCanvas);
                } else {
                    ctx.lineTo(x, yCanvas);
                }
            }
            ctx.stroke();

            // 2. El valor avanza progresivamente con el tiempo
            avanceTiempo -= 0.1; 
        }

        // 3. y 5. Actualizamos el gráfico continuamente usando setInterval (50ms para fluidez)
        setInterval(actualizarCoseno, 50);
    </script>
</body>
</html>
