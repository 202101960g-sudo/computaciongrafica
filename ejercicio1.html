<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Barras</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-volver { display: inline-block; padding: 8px 16px; border: 1px solid #30363d; color: #58a6ff; text-decoration: none; border-radius: 6px; margin-bottom: 20px; }
        .grafico-container { background: #161b22; padding: 30px; border-radius: 10px; display: inline-block; border: 1px solid #30363d; }
        #contenedor { display: flex; align-items: flex-end; height: 300px; gap: 20px; border-bottom: 2px solid #8b949e; width: 400px; margin: 0 auto; }
        .barra { width: 60px; background-color: #58a6ff; transition: height 0.3s ease; border-radius: 4px 4px 0 0; }
        .valor { margin-top: -25px; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>
    
    <div class="grafico-container">
        <h2>Gráfico de Barras Dinámico</h2>
        <div id="contenedor">
            <div class="barra"><div class="valor"></div></div>
            <div class="barra"><div class="valor"></div></div>
            <div class="barra"><div class="valor"></div></div>
            <div class="barra"><div class="valor"></div></div>
            <div class="barra"><div class="valor"></div></div>
        </div>
    </div>

    <script>
        const barras = document.querySelectorAll('.barra');
        const valoresTextos = document.querySelectorAll('.valor');

        function actualizarDatos() {
            barras.forEach((barra, index) => {
                // Asignar valores aleatorios entre 10 y 100
                const valor = Math.floor(Math.random() * 91) + 10; 
                
                // Actualizar altura de la barra
                barra.style.height = valor + '%';
                // Mostrar el número arriba de la barra
                valoresTextos[index].innerText = valor;
            });
        }

        // Actualizar cada segundo (1000ms) usando setInterval
        setInterval(actualizarDatos, 1000);
        actualizarDatos(); // Llamada inicial
    </script>
</body>
</html>
